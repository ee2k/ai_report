port: 7890
socks-port: 7891
allow-lan: true
mode: rule
log-level: info
external-controller: 127.0.0.1:9090
proxies:
  - name: SSH_SERVER_1
    type: socks5
    server: 127.0.0.1
    port: 12345
proxy-groups:
  - type: select
    name: LOCAL_PROXY
    interval: 1800
    timeout: 5000
    max-failed-times: 5
    lazy: true
    proxies:
      - SSH_SERVER_1
rules:
  - GEOIP,CN,DIRECT
  - MATCH,LOCAL_PROXY
