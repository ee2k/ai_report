port: 7890
socks-port: 7891
allow-lan: true
mode: rule
log-level: info
external-controller: 127.0.0.1:9090
proxies:
  - name: SSH_SERVER_1
    type: socks5
    server: 127.0.0.1
    port: 12345
  - name: SSH_SERVER_2
    type: socks5
    server: 127.0.0.1
    port: 12346
proxy-groups:
  - type: url-test
#select: Lets you manually choose which proxy to use.
#url-test: This tests proxies against URLs (for auto selection based on server performance).
#load-balance: Distributes traffic evenly across all proxies in the group.
#fallback: Tries the first proxy and falls back to the next if the first one fails.
    name: LOCAL_PROXY
    interval: 1800
    timeout: 5000
    max-failed-times: 5
    lazy: true
    proxies:
      - SSH_PORT_FORWARD
      - SSH_SERVER_2
rules:
  - GEOIP,CN,DIRECT
  - MATCH,LOCAL_PROXY
